services:
  db:
    image: postgres:16-alpine
    container_name: macro_dashboard_db
    environment:
      - POSTGRES_USER=macro
      - POSTGRES_PASSWORD=macro
      - POSTGRES_DB=macro_dashboard
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
